<!DOCTYPE html>
<html>
<body style="margin:0">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three/build/three.module.js","three/addons/":"https://unpkg.com/three/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

const clock = new THREE.Clock();
let mixer;

new GLTFLoader().load('cube.glb', g => {
  scene.add(g.scene);
  if (g.animations.length) {
    mixer = new THREE.AnimationMixer(g.scene);
    g.animations.forEach(clip => mixer.clipAction(clip).play());
  }
});

const moveSpeed = 5;
const direction = new THREE.Vector3();
const forward  = new THREE.Vector3();
const right    = new THREE.Vector3();

renderer.setAnimationLoop(() => {
  const delta = clock.getDelta();
  mixer?.update(delta);

  // Get camera facing directions (ignore vertical)
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  direction.set(0, 0, 0);
  if (keys['w']) direction.addScaledVector(forward,  1);
  if (keys['s']) direction.addScaledVector(forward, -1);
  if (keys['a']) direction.addScaledVector(right,   -1);
  if (keys['d']) direction.addScaledVector(right,    1);

  if (direction.lengthSq() > 0) {
    direction.normalize().multiplyScalar(moveSpeed * delta);
    camera.position.add(direction);
    controls.target.add(direction);
  }

  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
