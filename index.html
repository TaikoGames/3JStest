<!DOCTYPE html>
<html>
<body style="margin:0">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three/build/three.module.js","three/addons/":"https://unpkg.com/three/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const dirLight = new THREE.DirectionalLight(0xffffff, 4);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const initPos = camera.position.clone();
const initTarget = controls.target.clone();

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Enter') {
    camera.position.copy(initPos);
    controls.target.copy(initTarget);
  }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

window.addEventListener('click', e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const hits = raycaster.intersectObjects(scene.children, true);
  if (hits.length > 0) {
    if (hits[0].object.name === 'MyCube') {
      window.open('https://www.blendertutoring.com', '_blank');
    }
  }
});

window.addEventListener('mousemove', e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const hits = raycaster.intersectObjects(scene.children, true);
  const hit = hits.find(h => h.object.name === 'MyCube');
  document.body.style.cursor = hit ? 'pointer' : 'default';
});

const clock = new THREE.Clock();
let mixer;

const mat = new THREE.MeshStandardMaterial({
  color: 0xaa0000,
  metalness: 1.0,
  roughness: 0.15,
});

mat.onBeforeCompile = shader => {
  shader.uniforms.uTime = { value: 0 };
  mat.userData.shader = shader;

  shader.fragmentShader = `
    uniform float uTime;
    ${shader.fragmentShader}
  `.replace(
    '#include <dithering_fragment>',
    `
    #include <dithering_fragment>

    vec3 viewDir = normalize(vViewPosition);
    vec3 norm    = normalize(vNormal);

    float fresnel = pow(1.0 - dot(norm, viewDir), 3.0);

    float angle = dot(norm, viewDir) + uTime * 0.4;
    vec3 iridescence = vec3(
      0.5 + 0.5 * sin(angle * 6.0 + 0.0),
      0.5 + 0.5 * sin(angle * 6.0 + 2.094),
      0.5 + 0.5 * sin(angle * 6.0 + 4.189)
    );

    float pulse = 0.8 + 0.2 * sin(uTime * 2.0);

    vec3 rimColor = vec3(1.0, 0.1, 0.05);

    gl_FragColor.rgb += rimColor * fresnel * 1.2 * pulse;
    gl_FragColor.rgb += iridescence * fresnel * 0.8;
    gl_FragColor.rgb = mix(gl_FragColor.rgb, iridescence, fresnel * 0.3);
    `
  );
};

new GLTFLoader().load('cube.glb', g => {
  scene.add(g.scene);

  g.scene.traverse(child => {
    if (child.isMesh) child.material = mat;
  });

  if (g.animations.length) {
    mixer = new THREE.AnimationMixer(g.scene);
    g.animations.forEach(clip => mixer.clipAction(clip).play());
  }
});

const moveSpeed = 5;
const direction = new THREE.Vector3();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();

renderer.setAnimationLoop(() => {
  const delta = clock.getDelta();
  mixer?.update(delta);

  if (mat.userData.shader) {
    mat.userData.shader.uniforms.uTime.value = clock.elapsedTime;
  }

  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  direction.set(0, 0, 0);
  if (keys['w']) direction.addScaledVector(forward,  1);
  if (keys['s']) direction.addScaledVector(forward, -1);
  if (keys['a']) direction.addScaledVector(right,   -1);
  if (keys['d']) direction.addScaledVector(right,    1);

  if (direction.lengthSq() > 0) {
    direction.normalize().multiplyScalar(moveSpeed * delta);
    camera.position.add(direction);
    controls.target.add(direction);
  }

  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
